<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resources, Westchester BESS, BCW &amp; EarthKind</title>
<meta name="description" content="Battery Energy Storage (BESS) documents, fact sheets, and legal summaries from the BCW / EarthKind Clean Energy Action Coalition. View each document as a page-turning book.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2214%22 y=%2230%22 width=%2266%22 height=%2240%22 rx=%228%22 fill=%22none%22 stroke=%22%231F3864%22 stroke-width=%228%22/><rect x=%2282%22 y=%2242%22 width=%2210%22 height=%2216%22 rx=%223%22 fill=%22%231F3864%22/><rect x=%2226%22 y=%2242%22 width=%2236%22 height=%2216%22 rx=%223%22 fill=%22%231F8A4C%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A2333;--muted:#5B6675;--line:#E4E8F0;--bg:#F5F7FB;--card:#fff;
    --navy:#1F3864;--navy-900:#16294A;--navy-700:#264A7E;
    --accent:#2F6FB2;--accent-soft:#EAF1F9;--green:#1F8A4C;
    --radius:14px;--shadow:0 1px 2px rgba(20,40,80,.05), 0 6px 18px rgba(20,40,80,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 70px}
  header.top{background:linear-gradient(135deg,var(--navy-900),var(--navy) 58%,var(--navy-700));border-radius:18px;box-shadow:var(--shadow);padding:24px 28px;margin-bottom:20px}
  .eyebrow{font-size:12px;font-weight:700;color:#A9C6EA;letter-spacing:1.4px;text-transform:uppercase}
  header.top h1{font-size:28px;line-height:1.12;letter-spacing:-.5px;margin:7px 0 4px;color:#fff;font-weight:800}
  header.top p{margin:0;color:#CFDCEF;font-size:15px}
  .back{display:inline-block;margin-top:12px;font-size:13px;color:#DCE7F5;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:4px 13px}
  .back:hover{text-decoration:none;background:rgba(255,255,255,.2)}

  .doclist{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .doc{display:flex;gap:14px;align-items:flex-start;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;font-family:inherit;color:inherit;transition:transform .15s ease,box-shadow .15s ease;width:100%}
  .doc:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(20,40,80,.12)}
  .doc .ic{flex:0 0 auto;width:46px;height:58px;border-radius:6px;background:linear-gradient(160deg,#eaf1f9,#dbe6f4);border:1px solid #cdd9ea;position:relative;box-shadow:inset 0 0 0 1px #fff}
  .doc .ic::before{content:"PDF";position:absolute;left:0;right:0;bottom:8px;text-align:center;font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--accent)}
  .doc .ic::after{content:"";position:absolute;top:0;right:0;border-width:0 14px 14px 0;border-style:solid;border-color:#fff #f5f7fb}
  .doc .tx{flex:1;min-width:0}
  .doc h3{margin:0 0 3px;font-size:16.5px;color:var(--navy);font-weight:700;line-height:1.25}
  .doc .meta{font-size:12.5px;color:var(--muted)}
  .doc .desc{font-size:13px;color:#404a59;margin-top:6px}
  .doc .open{display:inline-block;margin-top:9px;font-size:12.5px;font-weight:700;color:var(--accent)}

  /* Viewer overlay */
  .viewer{position:fixed;inset:0;background:rgba(16,26,44,.78);backdrop-filter:blur(2px);display:none;z-index:50;padding:16px;flex-direction:column}
  .viewer.on{display:flex}
  .vbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:#fff;margin-bottom:10px}
  .vbar .vtitle{font-weight:700;font-size:15px;flex:1;min-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vbtn{appearance:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--navy);background:#fff;border:1px solid #cdd6e6;border-radius:9px;padding:8px 13px;cursor:pointer;transition:.12s}
  .vbtn:hover{background:var(--accent-soft);border-color:var(--accent)}
  .vbtn:disabled{opacity:.4;cursor:default}
  .vbtn.ghost{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.3)}
  .vbtn.ghost:hover{background:rgba(255,255,255,.24)}
  .pageind{color:#fff;font-size:13.5px;font-weight:600;min-width:120px;text-align:center;font-variant-numeric:tabular-nums}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;gap:14px;position:relative;overflow:hidden}
  .navbtn{flex:0 0 auto;width:46px;height:46px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:var(--navy);font-size:22px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;transition:.12s}
  .navbtn:hover{background:#fff;transform:scale(1.06)}
  .navbtn:disabled{opacity:.35;cursor:default;transform:none}
  .flipwrap{flex:1;max-width:calc(100% - 130px);height:100%;display:flex;align-items:center;justify-content:center;position:relative}
  #flip{margin:0 auto}
  #flip .page{background:#fff;overflow:hidden}
  #flip .page img{display:block;width:100%;height:100%;object-fit:contain;background:#fff}
  .vspin{position:absolute;color:#fff;font-size:14px;opacity:.9}
  @media (prefers-reduced-motion: reduce){ .doc:hover{transform:none} }
  @media (max-width:560px){ .navbtn{width:40px;height:40px} .flipwrap{max-width:calc(100% - 92px)} }
  footer{color:var(--muted);font-size:12.5px;margin-top:30px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">BCW &amp; EarthKind &middot; Clean Energy Action Coalition</div>
    <h1>Resources</h1>
    <p>Battery energy storage fact sheets, legal summaries, and filings. Click any document to read it as a page-turning book.</p>
    <a class="back" href="index.html">&larr; Back to the BESS Policy Dashboard</a>
  </header>

  <div class="doclist" id="doclist"></div>

  <footer id="footer"></footer>
</div>

<!-- Viewer overlay -->
<div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-label="Document viewer">
  <div class="vbar">
    <span class="vtitle" id="vtitle"></span>
    <a class="vbtn ghost" id="vdownload" download>Download PDF</a>
    <button class="vbtn ghost" id="vclose" aria-label="Close viewer">Close &times;</button>
  </div>
  <div class="stage">
    <button class="navbtn" id="prev" aria-label="Previous pages">&#8249;</button>
    <div class="flipwrap">
      <div id="flip"></div>
      <span class="vspin" id="vspin" style="display:none">Preparing document&hellip;</span>
    </div>
    <button class="navbtn" id="next" aria-label="Next pages">&#8250;</button>
  </div>
  <div class="vbar" style="justify-content:center;margin:10px 0 0">
    <button class="vbtn" id="prev2">&larr; Prev</button>
    <span class="pageind" id="pageind"></span>
    <button class="vbtn" id="next2">Next &rarr;</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
  // Keep rendering alive even if the tab is backgrounded (browsers throttle
  // requestAnimationFrame when hidden, which would otherwise stall pdf.js).
  (function(){
    const raf=window.requestAnimationFrame.bind(window);
    window.requestAnimationFrame=function(cb){
      return document.hidden ? setTimeout(()=>cb(performance.now()),16) : raf(cb);
    };
  })();

  const DOCS = [
    {title:"Energy Storage Fire & Safety Fact Sheet", file:"docs/fire-safety-fact-sheet.pdf", pages:5,
      desc:"How modern BESS installations are engineered and regulated for fire safety, with risk in perspective."},
    {title:"BESS Fact Sheet: Economic & Community Considerations", file:"docs/economic-community-considerations.pdf", pages:3,
      desc:"The local economic and community benefits of battery storage for Westchester municipalities."},
    {title:"Legal Moratorium Criteria Summary", file:"docs/legal-moratorium-criteria-summary.pdf", pages:1,
      desc:"A concise summary of the legal criteria that apply to local BESS moratoriums."},
    {title:"Filed Decision", file:"docs/filed-decision.pdf", pages:6,
      desc:"Full text of the filed decision, provided for reference."},
  ];

  if(window.pdfjsLib){
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }

  const el = id => document.getElementById(id);
  const viewer=el("viewer"), flipEl=el("flip"), vspin=el("vspin"), flipwrap=document.querySelector(".flipwrap");
  const prev=el("prev"), next=el("next"), prev2=el("prev2"), next2=el("next2");
  let pageFlip=null, pageImgs=[], pageRatio=0.773, total=0;

  // ---- Document list ----
  el("doclist").innerHTML = DOCS.map((d,i)=>`
    <button class="doc" onclick="openDoc(${i})">
      <span class="ic" aria-hidden="true"></span>
      <span class="tx">
        <h3>${d.title}</h3>
        <span class="meta">PDF &middot; ${d.pages} page${d.pages>1?"s":""}</span>
        <span class="desc">${d.desc||""}</span>
        <span class="open">Open document &rarr;</span>
      </span>
    </button>`).join("");
  el("footer").innerHTML =
    "Prepared for the BCW / EarthKind Clean Energy Action Coalition. Documents open in your browser; use Download to save a copy.";

  // ---- Render every PDF page to an image, then build the flipbook ----
  async function openDoc(i){
    const d=DOCS[i];
    el("vtitle").textContent=d.title;
    el("vdownload").href=d.file;
    el("vdownload").setAttribute("download", d.title.replace(/[^\w]+/g,"_")+".pdf");
    viewer.classList.add("on"); document.body.style.overflow="hidden";
    destroyFlip(); flipEl.innerHTML=""; el("pageind").textContent="";
    vspin.style.display=""; vspin.textContent="Preparing document…";
    try{
      const pdf=await pdfjsLib.getDocument(d.file).promise;
      total=pdf.numPages;
      pageImgs=[];
      for(let p=1;p<=total;p++){
        const page=await pdf.getPage(p);
        const v1=page.getViewport({scale:1});
        pageRatio=v1.width/v1.height;
        const targetW=1650, scale=targetW/v1.width;
        const vp=page.getViewport({scale});
        const c=document.createElement("canvas");
        c.width=vp.width; c.height=vp.height;
        await page.render({canvasContext:c.getContext("2d"), viewport:vp}).promise;
        pageImgs.push(c.toDataURL("image/jpeg", 0.85));
      }
      vspin.style.display="none";
      buildFlip();
    }catch(err){ vspin.textContent="Could not load this document."; console.error(err); }
  }
  window.openDoc=openDoc;

  function pageSize(){
    const availW=Math.max(200, flipwrap.clientWidth-6), availH=Math.max(260, flipwrap.clientHeight-6);
    const portrait = availW < 680 || total===1;
    let h=availH, w=h*pageRatio;
    const perBook = portrait ? 1 : 2;
    if(w*perBook > availW){ w=availW/perBook; h=w/pageRatio; }
    return {w:Math.floor(w), h:Math.floor(h), portrait};
  }

  function buildFlip(){
    destroyFlip();
    flipEl.innerHTML="";
    // Single-page documents: StPageFlip needs a real book, so just show the page.
    if(total===1){
      const img=document.createElement("img");
      img.src=pageImgs[0]; img.alt="Page 1";
      img.style.cssText="max-width:100%;max-height:100%;width:auto;height:auto;display:block;background:#fff;border-radius:3px;box-shadow:0 14px 40px rgba(0,0,0,.45)";
      flipEl.appendChild(img);
      el("pageind").textContent="Page 1 / 1";
      prev.disabled=prev2.disabled=next.disabled=next2.disabled=true;
      return;
    }
    const {w,h,portrait}=pageSize();
    // Build native <img> pages and use StPageFlip HTML mode — crisp images,
    // no canvas downsampling, and no heavy shadow tint over the content.
    const frag=document.createDocumentFragment();
    pageImgs.forEach((src,i)=>{
      const d=document.createElement("div"); d.className="page";
      const im=document.createElement("img"); im.src=src; im.alt="Page "+(i+1); im.draggable=false;
      d.appendChild(im); frag.appendChild(d);
    });
    flipEl.appendChild(frag);
    pageFlip=new St.PageFlip(flipEl,{
      width:w, height:h, size:"fixed",
      showCover:false, usePortrait:portrait, drawShadow:true,
      maxShadowOpacity:0.18, flippingTime:650, mobileScrollSupport:false, useMouseEvents:true
    });
    pageFlip.loadFromHTML(flipEl.querySelectorAll(".page"));
    pageFlip.on("flip", e=>updateInd(e.data));
    updateInd(0);
  }
  function destroyFlip(){ if(pageFlip){ try{pageFlip.destroy();}catch(e){} pageFlip=null; } }

  function updateInd(idx){
    const portrait = pageFlip && pageFlip.getOrientation && pageFlip.getOrientation()==="portrait";
    let left, right;
    if(portrait){ left=idx+1; right=left; }
    else { left = idx%2===0 ? idx+1 : idx; right=Math.min(left+1, total); }
    el("pageind").textContent = (left===right) ? `Page ${left} / ${total}` : `Pages ${left}–${right} / ${total}`;
    const atStart=left<=1, atEnd=right>=total;
    prev.disabled=prev2.disabled=atStart; next.disabled=next2.disabled=atEnd;
  }

  function flipNext(){ if(pageFlip) pageFlip.flipNext(); }
  function flipPrev(){ if(pageFlip) pageFlip.flipPrev(); }
  prev.onclick=prev2.onclick=flipPrev;
  next.onclick=next2.onclick=flipNext;

  function closeViewer(){ viewer.classList.remove("on"); document.body.style.overflow=""; destroyFlip(); pageImgs=[]; }
  el("vclose").onclick=closeViewer;
  viewer.addEventListener("click", e=>{ if(e.target===viewer) closeViewer(); });
  document.addEventListener("keydown", e=>{
    if(!viewer.classList.contains("on")) return;
    if(e.key==="ArrowRight"||e.key==="PageDown"){e.preventDefault();flipNext();}
    else if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();flipPrev();}
    else if(e.key==="Escape"){closeViewer();}
  });
  // rebuild on resize (keeps the book fitted; restores current page)
  let _rt;
  window.addEventListener("resize", ()=>{
    if(!pageFlip||!pageImgs.length) return;
    clearTimeout(_rt);
    _rt=setTimeout(()=>{
      const cur = pageFlip.getCurrentPageIndex();
      buildFlip();
      if(cur>0 && pageFlip) pageFlip.turnToPage(cur);
    }, 180);
  });
</script>
</body>
</html>
