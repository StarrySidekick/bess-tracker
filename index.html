<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BESS Policy Dashboard — Westchester Towns</title>
<style>
  :root{
    --ink:#111;--muted:#5a5a5a;--line:#e2e6ee;--bg:#f6f8fb;--card:#fff;
    --navy:#1f3864;--red:#c0392b;--maroon:#7b1d12;--amber:#b8860b;--green:#2e7d32;--accent:#2e75b6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Calibri,"Segoe UI",Candara,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 64px}
  header.top{border-bottom:3px solid var(--navy);padding-bottom:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
  .headtext{min-width:240px;flex:1}
  .logo{width:172px;max-width:44vw;height:auto;flex-shrink:0;margin-top:2px}
  .eyebrow{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:.3px}
  h1{font-size:30px;margin:4px 0 2px}
  .sub{color:var(--muted);font-size:16px}
  .updated{display:inline-block;margin-top:8px;font-size:12.5px;color:var(--muted);background:#eef2f8;border:1px solid var(--line);border-radius:20px;padding:3px 11px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:20px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;text-align:center}
  .stat .n{font-size:28px;font-weight:700;line-height:1}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:5px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 18px}
  .controls input{flex:1;min-width:180px;padding:9px 12px;border:1px solid #ccd3e0;border-radius:8px;font-size:15px;font-family:inherit}
  .chip{border:1px solid #ccd3e0;background:#fff;border-radius:20px;padding:6px 13px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;border-left:6px solid var(--line)}
  .card.active{border-left-color:var(--red)}
  .card.ban{border-left-color:var(--maroon)}
  .card.expired{border-left-color:var(--amber)}
  .card.regulated{border-left-color:var(--accent)}
  .card.none{border-left-color:var(--green)}
  .chead{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:14px 18px;cursor:pointer}
  .chead h2{font-size:20px;margin:0;flex:1;min-width:200px}
  .badge{font-size:12px;font-weight:700;border-radius:20px;padding:3px 11px;white-space:nowrap}
  .b-active{background:#fdecea;color:var(--red)}
  .b-ban{background:#7b1d12;color:#fff}
  .b-expired{background:#fbf3e0;color:var(--amber)}
  .b-regulated{background:#e7f0fb;color:var(--accent)}
  .b-none{background:#e8f5e9;color:var(--green)}
  .scope{font-size:12.5px;color:var(--muted)}
  .toggle{font-size:13px;color:var(--accent);font-weight:600}
  .cbody{display:none;padding:2px 18px 18px;border-top:1px solid var(--line)}
  .card.open .cbody{display:block}
  .meta{display:grid;grid-template-columns:160px 1fr;gap:4px 14px;font-size:14.5px;margin:12px 0}
  .meta div.k{font-weight:700;color:#333}
  h3{font-size:15px;margin:16px 0 6px;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
  ul{margin:6px 0;padding-left:20px}
  li{margin:3px 0}
  .flag{border-left:4px solid var(--amber);background:#fdf8ec;padding:8px 12px;border-radius:0 6px 6px 0;font-size:13.5px;margin:8px 0}
  .contact{font-size:14px;margin:4px 0}
  .contact b{color:#222}
  .links a{display:inline-block;margin:3px 12px 3px 0;font-size:13.5px}
  section.block{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 20px 18px;margin-top:18px}
  section.block h2{font-size:21px;border-bottom:2px solid var(--line);padding-bottom:8px}
  .pill{display:inline-block;font-size:11.5px;font-weight:700;border-radius:6px;padding:2px 8px;margin-left:6px}
  .p-high{background:#e8f5e9;color:var(--green)}
  .p-med{background:#fbf3e0;color:var(--amber)}
  .p-open{background:#e7f0fb;color:var(--accent)}
  .p-low{background:#f3d6d2;color:var(--maroon)}
  footer{color:var(--muted);font-size:12.5px;margin-top:26px;text-align:center}
  .hide{display:none!important}
</style>
</head>

t Pleasant moved from a moratorium to a permanent ban on new BESS in December 2025. Supervisor Carl Fulgenzi said the decision followed considerable public input and study of BESS mishaps nationwide; the Board referenced the July 2025 US EPA safety guidance.", "As one of the hardest-line jurisdictions in the county, Mount Pleasant is mainly a monitor-and-watch town unless the Board revisits the ban."], "flags": ["Status shown as a permanent ban per the town's Dec 2025 prohibition local law and press release. The Carina tracker (refreshed June 26, 2026) now lists Mount Pleasant's moratorium as LIFTED (type BAN) — consistent with the moratorium having been replaced by the adopted prohibition law, which governs. Bans can be challenged or revised; track any reconsideration, variance pathway, or litigation."], "committees": ["<b>Town Board</b> — adopted the ban.", "<b>Planning Board & Zoning Board of Appeals</b> — would handle any future change.", "<b>Conservation Advisory Council</b> — potential ally."], "meetings": ["<b>Schedule & agendas:</b> Town Board agendas and the meeting calendar are posted on the town site; confirm current dates there."], "officials": [{"role": "Town Supervisor", "name": "Carl Fulgenzi", "phone": "(914) 742-2337"}, {"role": "Town Board", "name": "Danielle Zaino (Deputy Supervisor), Mark Saracino, Joe Bonanno, Thomas Sialiano"}, {"role": "Town Hall", "name": "One Town Hall Plaza, Valhalla, NY 10595", "phone": "(914) 742-2300"}], "links": [["Supervisor / Town Board", "https://www.mtpleasantny.gov/255/Supervisor-Town-Board"], ["Agendas & Minutes", "https://www.mtpleasantny.gov/129/Agendas-Minutes"], ["Press release: BESS ban", "https://www.mtpleasantny.gov/m/newsflash/Home/Detail/560"], ["Local Law prohibiting BESS (PDF)", "https://mtpleasantny.gov/DocumentCenter/View/2165/Local-Law-Prohibiting-Battery-Energy-Storage-Systems-8252025"]]}, {"name": "Village/Town of Mount Kisco", "status": "ban", "statusLabel": "BAN (effective)", "scope": "New BESS effectively prohibited", "window": "LOW", "windowClass": "p-low", "subtitle": "Northern Westchester", "snapshot": [["Governing law", "Aug 2025: Village Board voted unanimously not to classify BESS as a 'public utility,' effectively prohibiting new BESS village-wide — after twice extending a 2024 moratorium."], ["Why a ban", "Mayor Cindrich said the Board wanted to protect the village until the technology improves and firefighters are better equipped for lithium-ion fires."], ["Note", "Mount Kisco already hosts three large-scale BESS facilities (Oakwood Cemetery/former landfill, courthouse/police roof) plus smaller units."]], "summary": ["Mount Kisco enacted a six-month moratorium in 2024 (with two three-month extensions) after a large-scale BESS was proposed near the Diamond Properties soccer field at 333 North Bedford Road. In August 2025 the Village Board effectively banned new BESS by declining to treat them as a 'public utility' under the village code.", "Notably, several BESS facilities already operate in the village, so the ban applies to new development."], "flags": ["The ban was implemented via a zoning interpretation (BESS not a 'public utility') rather than a standalone ban law; confirm the exact mechanism and any challenge. The Carina tracker (refreshed June 14, 2026) lists Mount Kisco's earlier moratorium as EXPIRED — consistent with the Village replacing the moratorium with the Aug 2025 effective ban."], "committees": ["<b>Village Board of Trustees</b> — adopted the effective ban.", "<b>Planning Board & Zoning Board of Appeals</b> — would handle any future change.", "<b>Conservation Advisory Council / sustainability</b> — potential ally."], "meetings": ["<b>Schedule & agendas:</b> Confirm the Village Board meeting schedule and agendas on the Mount Kisco site."], "officials": [{"role": "Mayor", "name": "J. Michael Cindrich", "email": "mayorcindrich@mountkiscony.gov", "phone": "(914) 864-0033"}, {"role": "Village Board", "name": "Mayor + Trustees (confirm /* ============== RENDER ============== */
const el = s => document.querySelector(s);
const linkList = arr => `<div class="links">${arr.map(l=>`<a href="${l[1]}" target="_blank" rel="noopener">${l[0]} ↗</a>`).join("")}</div>`;

function contactLine(o){
  let bits = [`<b>${o.role}:</b> ${o.name}`];
  if(o.email) bits.push(`Email: <a href="mailto:${o.email}">${o.email}</a>`);
  if(o.phone) bits.push(`Phone: ${o.phone}`);
  return `<div class="contact">${bits.join(" &nbsp;·&nbsp; ")}</div>`;
}

function renderStats(){
  const order=["active","ban","expired","regulated","none"];
  const counts={};order.forEach(k=>counts[k]=0);
  DATA.towns.forEach(t=>{counts[t.status]=(counts[t.status]||0)+1;});
  el("#stats").innerHTML=order.map(k=>{
    const m=DATA.statusMeta[k];
    return `<div class="stat"><div class="n" style="color:${m.color}">${counts[k]||0}</div><div class="l">${m.label}</div></div>`;
  }).join("");
}

const sec = (title, html) => html ? `<h3>${title}</h3>${html}` : "";
function renderCards(){
  el("#cards").innerHTML=DATA.towns.map((t,i)=>{
    const meta=t.snapshot.map(r=>`<div class="k">${r[0]}</div><div>${r[1]}</div>`).join("");
    const flags=(t.flags||[]).map(f=>`<div class="flag"><b>Confidence flag —</b> ${f}</div>`).join("");
    const committees=(t.committees&&t.committees.length)?`<ul>${t.committees.map(c=>`<li>${c}</li>`).join("")}</ul>`:"";
    const meetings=(t.meetings&&t.meetings.length)?t.meetings.map(m=>`<p>${m}</p>`).join(""):"";
    const officials=(t.officials&&t.officials.length)?t.officials.map(contactLine).join(""):"";
    const links=(t.links&&t.links.length)?linkList(t.links):"";
    return `<div class="card ${t.status}" data-town="${i}">
      <div class="chead" onclick="toggle(${i})">
        <h2>${t.name}</h2>
        <span class="badge b-${t.status}">${t.statusLabel}</span>
        <span class="scope">${t.scope}<span class="pill ${t.windowClass}">${t.window}</span></span>
        <span class="toggle" id="tg${i}">＋ details</span>
      </div>
      <div class="cbody">
        <div style="color:var(--muted);font-style:italic;font-size:13.5px">${t.subtitle}</div>
        <div class="meta">${meta}</div>
        ${sec("BESS Activity, News & Decisions", t.summary.map(p=>`<p>${p}</p>`).join("")+flags)}
        ${sec("Relevant Committees", committees)}
        ${sec("Meetings — Agendas & Hearings", meetings)}
        ${sec("Key Officials & Contacts", officials)}
        ${sec("More Links", links)}
      </div>
    </div>`;
  }).join("");
}

function toggle(i){
  const card=document.querySelector(`.card[data-town="${i}"]`);
  card.classList.toggle("open");
  el(`#tg${i}`).textContent=card.classList.contains("open")?"− collapse":"＋ details";
}

function renderBlocks(){
  el("#context").innerHTML=`<h2>Why Local Moratoriums Matter — State Context</h2>`+
    DATA.state.points.map(p=>`<p><b>${p[0]}</b> ${p[1]}</p>`).join("")+linkList(DATA.state.links);
  el("#steps").innerHTML=`<h2>Recommended Next Steps</h2><ul>${DATA.steps.map(s=>`<li>${s}</li>`).join("")}</ul>`;
  const vf=DATA.towns.filter(t=>t.flags&&t.flags.length).map(t=>`<li><b>${t.name.replace(/^(Town \/ Village of |Village\/Town of |Town of |Village of |City of )/,"")}:</b> ${t.flags.join(" ")}</li>`).join("");
  el("#verify").innerHTML=`<h2>Verification & Confidence</h2>
    <p><b>High confidence (verified against official sites + the May 2026 statewide tracker):</b> moratorium/ban status for all towns; meeting schedules and officials for Cortlandt, Rye Brook, Pound Ridge, Mount Pleasant, Peekskill, Yorktown, Greenburgh, Mamaroneck (Village); the State Context / ORES points; all links below.</p>
    <p><b>Newly added towns:</b> rosters and some phone numbers come from public directories and official sites and should be confirmed before formal outreach. Items to re-confirm:</p><ul>${vf}</ul>
    <p><b>Reference entries:</b> the remaining Westchester towns and cities are listed for completeness with a “NONE on record” badge. They do not appear in the statewide moratorium tracker (May 2026) and were not individually researched in depth — confirm directly before relying on them. (Somers is an exception: it amended its code to ban large battery farms.)</p>
    <p style="font-size:13px;color:var(--muted)"><b>Link check:</b> all town, board, tracker, and NYSERDA links resolve. Some town sites (New Castle, eCode360) load via JavaScript, so their live content renders only in a browser — the URLs are correct.</p>`;
  if(DATA.changelog) el("#changelog").innerHTML = `<h2>What Changed</h2>` + DATA.changelog.slice(0,8).map(c=>`<p><b>${c.date}:</b> ${c.items.join(" ")}</p>`).join("");
  el("#sources").innerHTML=`<h2>Sources</h2>${linkList(DATA.sources)}`;
}

function fmtDate(d){const o={year:"numeric",month:"long",day:"numeric"};return new Date(d+"T12:00:00").toLocaleDateString("en-US",o);}

function applyFilter(){
  const q=el("#search").value.trim().toLowerCase();
  const f=document.querySelector(".chip.on").dataset.f;
  document.querySelectorAll(".card").forEach((c,i)=>{
    const t=DATA.towns[i];
    const hay=JSON.stringify(t).toLowerCase();
    const okStatus = f==="all"||t.status===f;
    const okSearch = !q||hay.includes(q);
    c.classList.toggle("hide", !(okStatus&&okSearch));
  });
}

document.addEventListener("DOMContentLoaded",()=>{
  el("#updated").textContent="Data verified: "+fmtDate(DATA.lastUpdated)+" · "+DATA.towns.length+" towns · refreshed daily";
  el("#footer").innerHTML=`Prepared for the BCW / EarthKind BESS Workgroup · Data as of ${fmtDate(DATA.lastUpdated)}.<br>BESS status reflects the May 2026 statewide tracker and town records; confirm the latest votes at each town's next meeting.`;
  renderStats();renderCards();renderBlocks();
  el("#search").addEventListener("input",applyFilter);
  document.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    ch.classList.add("on");applyFilter();
  }));
});
</script>
</body>
</html>
