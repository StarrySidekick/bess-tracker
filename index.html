<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BESS Policy Dashboard — Westchester Towns</title>
<style>
  :root{
    --ink:#111;--muted:#5a5a5a;--line:#e2e6ee;--bg:#f6f8fb;--card:#fff;
    --navy:#1f3864;--red:#c0392b;--maroon:#7b1d12;--amber:#b8860b;--green:#2e7d32;--accent:#2e75b6;
  }
  *{box-sizing:border-box;border-radius:0 !important}
  body{margin:0;font-family:Calibri,"Segoe UI",Candara,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 64px}
  header.top{border-bottom:3px solid var(--navy);padding-bottom:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
  .headtext{min-width:240px;flex:1}
  .logo{width:172px;max-width:44vw;height:auto;flex-shrink:0;margin-top:2px}
  .eyebrow{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:.3px}
  h1{font-size:30px;margin:4px 0 2px}
  .sub{color:var(--muted);font-size:16px}
  .updated{display:inline-block;margin-top:8px;font-size:12.5px;color:var(--muted);background:#eef2f8;border:1px solid var(--line);border-radius:20px;padding:3px 11px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:20px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;text-align:center;cursor:pointer;font-family:inherit;width:100%;transition:border-color .12s,box-shadow .12s}
  .stat:hover{border-color:var(--accent)}
  .stat.sel{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy) inset}
  .stat .n{font-size:28px;font-weight:700;line-height:1}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:5px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 18px}
  .controls input{flex:1;min-width:180px;padding:9px 12px;border:1px solid #ccd3e0;border-radius:8px;font-size:15px;font-family:inherit}
  .exportbtn{border:1px solid #ccd3e0;background:#fff;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;color:var(--navy)}
  .exportbtn:hover{background:#eef2f8}
  .showall{border:1px solid #ccd3e0;background:#fff;border-radius:20px;padding:7px 14px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .showall:hover{background:#eef2f8}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;border-left:6px solid var(--line)}
  .card.active{border-left-color:var(--red)}
  .card.ban{border-left-color:var(--maroon)}
  .card.expired{border-left-color:var(--amber)}
  .card.regulated{border-left-color:var(--accent)}
  .card.none{border-left-color:var(--green)}
  .card.moratorium{border-left-color:var(--red)}
  .card.allowed{border-left-color:var(--green)}
  .card.silent{border-left-color:#aaa}
  .card.healthy{border-left-color:var(--green)}
  .card.overstrict{border-left-color:#c2680a}
  .chead{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:14px 18px;cursor:pointer}
  .chead h2{font-size:20px;margin:0;flex:1;min-width:200px}
  .badge{font-size:12px;font-weight:700;border-radius:20px;padding:3px 11px;white-space:nowrap}
  .b-active{background:#fdecea;color:var(--red)}
  .b-ban{background:#7b1d12;color:#fff}
  .b-expired{background:#fbf3e0;color:var(--amber)}
  .b-regulated{background:#e7f0fb;color:var(--accent)}
  .b-none{background:#e8f5e9;color:var(--green)}
  .b-moratorium{background:#fdecea;color:var(--red)}
  .b-allowed{background:#e8f5e9;color:var(--green)}
  .b-silent{background:#eee;color:#666}
  .b-healthy{background:#e8f5e9;color:var(--green)}
  .b-overstrict{background:#fdebd0;color:#b9770e}
  .p-strict{background:#fdebd0;color:#b9770e}
  .dr-badge{font-size:10.5px;font-weight:700;background:#1f3864;color:#fff;padding:1px 7px;margin-left:6px}
  .cal-wrap{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px}
  .cal-month{flex:1;min-width:230px}
  .cal-mh{font-weight:700;margin:2px 0 6px;color:var(--navy)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-dow{font-size:10.5px;color:var(--muted);text-align:center;padding:2px 0}
  .cal-day{position:relative;text-align:center;padding:7px 0;font-size:12.5px;border:1px solid #eee;color:#333}
  .cal-day.on{background:#eef2f8;border-color:var(--accent);font-weight:700}
  .cal-day.dl{background:#fdecea;border-color:var(--red)}
  .cal-list .d{font-weight:700;margin:8px 0 1px}
  .cal-list .ev{margin:1px 0 1px 10px;font-size:14px}
  .cal-list .dl{color:var(--red);font-weight:700}
  .scope{font-size:12.5px;color:var(--muted)}
  .toggle{font-size:13px;color:var(--accent);font-weight:600}
  .cbody{display:none;padding:2px 18px 18px;border-top:1px solid var(--line)}
  .card.open .cbody{display:block}
  .meta{display:grid;grid-template-columns:160px 1fr;gap:4px 14px;font-size:14.5px;margin:12px 0}
  .meta div.k{font-weight:700;color:#333}
  h3{font-size:15px;margin:16px 0 6px;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
  ul{margin:6px 0;padding-left:20px}
  li{margin:3px 0}
  .flag{border-left:4px solid var(--amber);background:#fdf8ec;padding:8px 12px;border-radius:0 6px 6px 0;font-size:13.5px;margin:8px 0}
  .contact{font-size:14px;margin:4px 0}
  .contact b{color:#222}
  .links a{display:inline-block;margin:3px 12px 3px 0;font-size:13.5px}
  section.block,.foldable{background:var(--card);border:1px solid var(--line);margin-top:18px}
  section.block{padding:6px 20px 18px}
  section.block h2{font-size:21px;border-bottom:2px solid var(--line);padding-bottom:8px}
  .foldable>summary{font-size:21px;font-weight:700;cursor:pointer;list-style:none;padding:14px 20px}
  .foldable>summary::-webkit-details-marker{display:none}
  .foldable>summary::before{content:"▸";color:var(--accent);display:inline-block;width:20px}
  .foldable[open]>summary{border-bottom:2px solid var(--line)}
  .foldable[open]>summary::before{content:"▾"}
  .foldable>div{padding:10px 20px 18px}
  #printroot{display:none}
  @page{size:letter;margin:0.5in 0}
  @media print{
    html,body{margin:0 !important;padding:0 !important;background:#fff}
    .wrap{display:none !important}
    #printroot{display:block !important;padding:0 0.5in;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  .pill{display:inline-block;font-size:11.5px;font-weight:700;border-radius:6px;padding:2px 8px;margin-left:6px}
  .p-high{background:#e8f5e9;color:var(--green)}
  .p-med{background:#fbf3e0;color:var(--amber)}
  .p-open{background:#e7f0fb;color:var(--accent)}
  .p-low{background:#f3d6d2;color:var(--maroon)}
  footer{color:var(--muted);font-size:12.5px;margin-top:26px;text-align:center}
  .hide{display:none!important}
</style>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
</head>

/* ============== DATA (updated by the daily refresh task) ============== */
const DATA = {"lastUpdated": "2026-06-30", "statusMeta": {"moratorium": {"label": "Active moratorium", "color": "var(--red)"}, "ban": {"label": "Ban", "color": "var(--maroon)"}, "healthy": {"label": "BESS Allowed", "color": "var(--green)"}, "overstrict": {"label": "Restrictive BESS Code", "color": "#c2680a"}, "silent": {"label": "No BESS code", "color": "#777777"}}, "state": {"points": [["New York is the epicenter of BESS restrictions.", "As of the June 2026 tracker refresh, New York had over 100 active local BESS moratoriums — more than 80% of every active BESS moratorium in the U.S. Westchester remains among the most-restricted counties. The coalition tracks 5 towns with an active moratorium (Bedford, Cortlandt, New Castle, the Village of Ossining, and Pound Ridge); Cortlandt's moratorium runs through Dec 31, 2026 per LL 7-2025, and Pound Ridge's through Sept 24, 2026. Mamaroneck Village concluded its moratorium drafting period and adopted a permanent restrictive code (LL 7-2026: Tier 1 ≤40/80 kWh; >80 kWh prohibited). Several towns have outright bans (Mount Pleasant, Mount Kisco, Somers)."], ["Local control is decisive for standalone projects.", "The State Office of Renewable Energy Siting (ORES) has no jurisdiction over standalone battery storage. A standalone BESS of any size must be permitted locally, so an active town moratorium or ban is binding with no state workaround. Only storage co-located with a solar/wind project ≥25 MW can use ORES to override local zoning."], ["Legislation to watch.", "Senate Bill S5506 (Kavanagh) and Assembly Bill A8378 (Levenberg) would expand ORES to standalone storage. Introduced Feb 2025, still in the Energy & Telecommunications Committee as of June 2026, not passed either chamber. Several Westchester municipalities (e.g., Yorktown) passed resolutions opposing it."], ["Most moratoriums are temporary — but some harden into bans.", "Moratoriums are usually a pause while a town writes zoning; a large NY cluster expires mid-to-late 2026. In Westchester, Mount Pleasant and Mount Kisco have moved from moratorium to effective bans, while Port Chester adopted permanent regulations instead. The next several months are the highest-leverage window to shape the permanent rules."]], "links": [["Carina Energy — NY BESS Tracker", "https://carina.energy/bess-moratoriums/new-york/"], ["NYSERDA — NY BESS Guidebook & Model Law", "https://www.nyserda.ny.gov/All-Programs/Clean-Energy-Siting-Resources/Battery-Energy-Storage-Guidebook"], ["NY Senate Bill S5506", "https://www.nysenate.gov/legislation/bills/2025/S5506"]]}, "towns": [{"name": "Town of Bedford", "status": "moratorium", "statusLabel": "MORATORIUM", "scope": "Tier 1 (<80 kWh) allowed; large-scale moratorium until 8/17/26", "window": "HIGH", "windowClass": "p-high", "subtitle": "Northern Westchester — Bedford Hills, Katonah, Bedford Village", "snapshot": [["Grid hosting capacity", "100% Red — Low capacity (ConEd/NYSEG hosting-capacity map)"], ["Governing law", "Moratorium adopted Aug 13, 2024; extended ~6 months — was set to expire July 16, 2025, extended through Jan 16, 2026 (confirm any further extension)."], ["Why a moratorium", "Concerns after fires at three NY BESS facilities since May 2023 and the volatility of lithium-ion batteries, especially large-scale."], ["Engagement window", "HIGH — moratorium time is being used to study and draft rules."]], "summary": ["Bedford adopted a BESS moratorium on Aug 13, 2024 and extended it (originally to expire July 16, 2025) through January 16, 2026 while it studies safety and prepares regulations; listed ACTIVE on the tracker.", "The moratorium supersedes the usual Town/Planning/Zoning Board application timelines. Engage during this drafting window.", "Local law: LL 1 of 2026: Tier 1 < 80 kWh allowed; Tier 2 > 80 kWh under a large-scale moratorium until 8/17/2026. (per the workgroup GIS sheet)."], "flags": ["Bedford remains ACTIVE on the Carina tracker (refreshed June 14, 2026), so the moratorium was extended past Jan 16, 2026 — but the current expiration date is unconfirmed. The full Town Board roster / a direct phone weren't verified. Confirm via the Town Board page and Agenda Center."], "committees": ["<b>Town Board</b> — adopted and extends the moratorium.", "<b>Planning Board & Zoning Board of Appeals</b> — future permitting.", "<b>Conservation Board / sustainability committees</b> — likely allies (confirm names)."], "meetings": ["<b>Schedule:</b> Town Board meets the 1st & 3rd Tuesdays at the Town House (321 Bedford Road, Bedford Hills); public open sessions at the start and end; Zoom available."], "officials": [{"role": "Town Supervisor", "name": "Ellen Z. Calves"}, {"role": "Town Board", "name": "5-member board incl. Bobbi Bittker and Andres L. Castillo (confirm full roster)"}, {"role": "Town House", "name": "321 Bedford Road, Bedford Hills, NY 10507"}], "links": [["Town Board", "https://www.bedfordny.gov/216/Town-Board"], ["Town Supervisor", "https://bedfordny.gov/252/Town-Supervisor"], ["Elected Officials", "https://bedfordny.gov/248/Elected-Officials"], ["Agenda Center", "https://bedfordny.gov/AgendaCenter"]], "dr": false, "hosting": {"raw": "100% Red", "tier": "Low capacity"}}, {"name": "Town of Cortlandt (Cortlandt Manor)", "status": "moratorium", "statusLabel": "MORATORIUM", "original": true, "scope": "Active moratorium — all BESS (expires 12/31/26 per LL 7-2025); code prohibits Tier 3", "window": "HIGH", "windowClass": "p-high", "subtitle": "Northwestern Westchester — Hudson River to the Putnam County line", "snapshot": [["Grid hosting capacity", "100% Yellow — High capacity (ConEd/NYSEG hosting-capacity map)"], ["Governing law", "LL 2-2024 (original) → LL 10-2024 → LL 2-2025 (through Dec 31, 2025) → LL 7-2025 (through Dec 31, 2026, per the Dec 9, 2025 public hearing notice). Active moratorium."], ["Why a moratorium", "Significant developer interest; town wants time to consult experts and await State/County guidance before adopting siting rules."], ["Engagement window", "HIGH — a committee is actively drafting the permanent local law."]], "summary": ["Cortlandt has had a moratorium in place continuously since 2024. After strong developer interest, the Town Board enacted LL 2-2024, convened a committee to draft a permanent law, and extended via LL 10-2024 and LL 2 of 2025 (through Dec 31, 2025). Still ACTIVE in 2026.", "Because the town is openly drafting, this is one of the best chances to influence the actual ordinance — setbacks, fire/safety standards, permitted zones.", "Local law: LL 7-2025 extends the moratorium on all BESS through 12/31/2026 (confirmed via the Town Board's Dec 9, 2025 public hearing notice; note that the workgroup GIS sheet notation 'until 07-2026' appears to be a date-entry issue — the legal notice text controls). The default code prohibits Tier 3 (utility-scale) systems."], "flags": ["LL 7-2025 confirmed to extend the moratorium through Dec 31, 2026, per the Town Board's public hearing notice for the December 9, 2025 meeting (fetched 6/30/26). The workgroup GIS sheet notes 'until 07-2026,' but the legal notice text stating 'through the end of 2026' is authoritative. Confirm LL 7-2025 was formally adopted at the Dec 9, 2025 meeting via the Town Clerk."], "committees": ["<b>Green Team / Climate Smart Task Force</b> — sustainability body; natural ally.", "<b>Town Board BESS drafting committee</b> — writing the permanent law (reach via Supervisor's office).", "<b>Planning Board & Zoning Board of Appeals</b> — review future BESS special permits."], "meetings": ["<b>Schedule:</b> Town Board meets monthly on a Tuesday at 7:00 PM, Vincent F. Nyberg General Meeting Room, Town Hall (1 Heady Street). Three Monday work sessions/month. Open to public.", "<b>Upcoming 2026 (7:00 PM):</b> Jul 21, Aug 11, Sep 15, Oct 20, Nov 17, Dec 8."], "officials": [{"role": "Town Supervisor", "name": "Dr. Richard Becker", "email": "supervisor@townofcortlandtny.gov", "phone": "(914) 734-1002"}, {"role": "Town Board Members", "name": "James F. Creighton, Cristin Jacoby, Robert E. Mayes, Joyce C. White", "email": "supervisor@townofcortlandtny.gov", "phone": "(914) 734-1002"}, {"role": "Town Hall", "name": "1 Heady Street, Cortlandt Manor, NY 10567", "phone": "(914) 734-1000"}], "links": [["Cortlandt moratorium law (PDF)", "https://ecode360.com/CO0244/laws/LF2549747.pdf"], ["Town Board", "https://www.townofcortlandtny.gov/cn/TownCouncil/?tpid=2441"], ["Planning Board", "https://www.townofcortlandtny.gov/cn/webpage.cfm?tpid=2585"], ["Zoning Board of Appeals", "https://www.townofcortlandtny.gov/cn/webpage.cfm?tpid=17478"], ["Calendar", "https://www.townofcortlandtny.gov/cn/eventscalendar"], ["Legal notices / hearings", "https://www.townofcortlandtny.gov/cn/webpage.cfm?TID=20&TPID=8003"], ["LL 2-2025 (moratorium PDF)", "https://www.townofcortlandtny.gov/documents/LL%202-25%20Battery%20Storage%20Moratorium%20Extension.pdf"]], "dr": false, "hosting": {"raw": "100% Yellow", "tier": "High capacity"}}, {"name": "Town of New Castle (Chappaqua / Millwood)", "status": "moratorium", "statusLabel": "MORATORIUM", "original": true, "scope": "Moratorium lapsed 5/31/26; tiered law proposed (Tier 1 40/80, Tier 2 ≤600, Tier 3 >600 kWh) — not yet adopted", "window": "HIGH", "windowClass": "p-high", "subtitle": "Central Westchester", "snapshot": [["Grid hosting capacity", "50% Red, 50% Yellow — Moderate capacity (ConEd/NYSEG hosting-capacity map)"], ["Proposed permanent law", "A draft permanent BESS local law would allow Tier 1 (≤80 kWh) only and explicitly prohibit Tier 2 and Tier 3 — stricter than the tiered Tier 1/2/3 framework previously described here. Referred to the Planning Board, which issued its response March 4, 2026; not yet shown as adopted by the Town Board."], ["Why a moratorium", "Supervisor Tipp cited NY's 70%-by-2030 / 100%-by-2040 goals alongside local protections after BESS fires elsewhere."], ["Engagement window", "HIGH — permanent law is drafted and pending a Town Board vote; this is the window to push back on the Tier 2/3 prohibition."]], "summary": ["New Castle paused battery-storage (and large-scale solar) development while it writes siting rules. Supervisor Victoria Tipp framed it as balancing NY's clean-energy targets against safety concerns from BESS fires elsewhere. Per Carina Energy's June 2026 tracker, the moratorium remains active through roughly August 2026.", "The permanent law under consideration has shifted from a permissive tiered framework toward one that would bar Tier 2 and Tier 3 storage entirely (Tier 1 ≤80 kWh only) — a meaningfully stricter direction than earlier drafts. The Planning Board responded to the referral March 4, 2026; the Town Board has not yet voted. Real room to influence the final thresholds before adoption.", "Local law: Moratorium on BESS / large-scale solar (LL 1-2025, extended by LL 7-2025); the workgroup's spreadsheet shows the extension chain running through ~5/31/2026, but Carina Energy's June 2026 statewide update lists New Castle as ACTIVE through approximately August 2026 — likely a further extension not yet posted to the Town's online Approved Legislation page (checked 6/29/26, no 2026 entries listed yet). (per the workgroup GIS sheet)."], "flags": ["Confirm (1) the full Town Board roster + member emails — the site is JavaScript-driven, so only Tipp, Saland, Levin, and Morton were verifiable — and (2) the exact current expiration date: the workgroup spreadsheet implies the original extension chain ran only through 5/31/2026, but Carina's June 2026 update says ACTIVE through ~Aug 2026 and the Town's Approved Legislation page shows no 2026 entries yet — there is a real possibility of a legal gap if no further extension was actually adopted. Verify directly with the Town Clerk before relying on either source.", "Confirm whether the Town Board has voted on the proposed permanent law (Tier 1 only, Tier 2/3 prohibited) since the Planning Board's March 4, 2026 referral response.", "The six-month moratorium lapsed 5/31/26; the proposed tiered law is not yet adopted — an open window to shape the code."], "committees": ["<b>Town Board</b> — leads the moratorium and the eventual regulation.", "<b>Sustainability Advisory Board / climate committees</b> — coordinate for a pro-clean-energy framing.", "<b>Planning Board & Zoning Board of Appeals</b> — future permitting authorities."], "meetings": ["<b>Schedule & agendas:</b> Town Board meets at New Castle Town Hall, 200 South Greeley Avenue, Chappaqua. See the Town Board page for the current calendar, agendas, roster and emails."], "officials": [{"role": "Town Supervisor", "name": "Victoria Bayard Tipp", "phone": "(914) 238-4771"}, {"role": "Deputy Supervisor", "name": "Jeremy Saland", "phone": "(914) 238-4771"}, {"role": "Town Board Members", "name": "include Lauren Levin and Lori Morton (confirm full roster + emails)", "phone": "(914) 238-4771"}, {"role": "Town Administrator", "name": "Robert Deary", "phone": "(914) 238-4774"}, {"role": "Town Hall", "name": "200 South Greeley Avenue, Chappaqua, NY 10514", "phone": "(914) 238-4771"}], "links": [["New Castle proposed legislation", "https://www.mynewcastleny.gov/290/Proposed-Legislation"], ["Town Board", "https://www.mynewcastleny.gov/296/Town-Board"], ["Boards & Commissions", "https://www.mynewcastleny.gov/250/Boards-Commissions"], ["Planning Board", "https://www.mynewcastleny.gov/300/Planning-Board"], ["Town Clerk", "https://www.mynewcastleny.gov/201/Town-Clerk"], ["Staff Directory", "https://www.mynewcastleny.gov/Directory.aspx?did=31"], ["Town Code (eCode360)", "https://ecode360.com/NE0395"]], "dr": false, "hosting": {"raw": "50% Red, 50% Yellow", "tier": "Moderate capacity"}}, {"name": "Village of Ossining", "status": "moratorium", "statusLabel": "MORATORIUM", "scope": "Active moratorium — all BESS; Local Law 4-2026, an 8-month term from April 2026", "window": "HIGH", "windowClass": "p-high", "subtitle": "Western Westchester — Hudson River", "snapshot": [["Grid hosting /* ============== RENDER ============== */
const el = s => document.querySelector(s);
let currentFilter = "all";
const linkList = arr => `<div class="links">${arr.map(l=>`<a href="${l[1]}" target="_blank" rel="noopener">${l[0]} ↗</a>`).join("")}</div>`;

function contactLine(o){
  let bits = [`<b>${o.role}:</b> ${o.name}`];
  if(o.email) bits.push(`Email: <a href="mailto:${o.email}">${o.email}</a>`);
  if(o.phone) bits.push(`Phone: ${o.phone}`);
  return `<div class="contact">${bits.join(" &nbsp;·&nbsp; ")}</div>`;
}

function renderStats(){
  const order=["moratorium","ban","overstrict","healthy","silent"];
  const counts={};order.forEach(k=>counts[k]=0);
  DATA.towns.forEach(t=>{counts[t.status]=(counts[t.status]||0)+1;});
  el("#stats").innerHTML=order.map(k=>{
    const m=DATA.statusMeta[k];
    return `<button type="button" class="stat" data-status="${k}" onclick="setFilter('${k}')" title="Filter to: ${m.label}"><div class="n" style="color:${m.color}">${counts[k]||0}</div><div class="l">${m.label}</div></button>`;
  }).join("");
  highlightStats();
}
function highlightStats(){
  document.querySelectorAll(".stat").forEach(s=>s.classList.toggle("sel", s.dataset.status===currentFilter));
}
function setFilter(s){
  currentFilter = (currentFilter===s) ? "all" : s;
  highlightStats();
  const sa=el("#showall"); if(sa) sa.style.display = (currentFilter==="all") ? "none" : "inline-block";
  applyFilter();
}

const sec = (title, html) => html ? `<h3>${title}</h3>${html}` : "";
function renderCards(){
  el("#cards").innerHTML=DATA.towns.map((t,i)=>{
    const meta=t.snapshot.map(r=>`<div class="k">${r[0]}</div><div>${r[1]}</div>`).join("");
    const flags=(t.flags||[]).map(f=>`<div class="flag"><b>Confidence flag —</b> ${f}</div>`).join("");
    const committees=(t.committees&&t.committees.length)?`<ul>${t.committees.map(c=>`<li>${c}</li>`).join("")}</ul>`:"";
    const meetings=(t.meetings&&t.meetings.length)?t.meetings.map(m=>`<p>${m}</p>`).join(""):"";
    const officials=(t.officials&&t.officials.length)?t.officials.map(contactLine).join(""):"";
    const links=(t.links&&t.links.length)?linkList(t.links):"";
    return `<div class="card ${t.status}" data-town="${i}">
      <div class="chead" onclick="toggle(${i})">
        <h2>${t.name}</h2>
        <span class="badge b-${t.status}">${t.statusLabel}</span>
        <span class="scope">${t.scope}<span class="pill ${t.windowClass}">${t.window}</span></span>
        <span class="toggle" id="tg${i}">＋ details</span>
      </div>
      <div class="cbody">
        <div style="color:var(--muted);font-style:italic;font-size:13.5px">${t.subtitle}</div>
        <div class="meta">${meta}</div>
        ${sec("BESS Activity, News & Decisions", t.summary.map(p=>`<p>${p}</p>`).join("")+flags)}
        ${sec("Relevant Committees", committees)}
        ${sec("Meetings — Agendas & Hearings", meetings)}
        ${sec("Key Officials & Contacts", officials)}
        ${sec("More Links", links)}
      </div>
    </div>`;
  }).join("");
}

function toggle(i){
  const card=document.querySelector(`.card[data-town="${i}"]`);
  card.classList.toggle("open");
  el(`#tg${i}`).textContent=card.classList.contains("open")?"− collapse":"＋ details";
}

function renderBlocks(){
  el("#context-body").innerHTML=
    DATA.state.points.map(p=>`<p><b>${p[0]}</b> ${p[1]}</p>`).join("")+linkList(DATA.state.links);
  if(DATA.priority){
    el("#actionplan-body").innerHTML = `<p style="color:var(--muted);font-size:13.5px">Ranked by how open the moment is to change the code (active or just-expired moratorium), the town's size, urgency, and now <b>grid hosting capacity</b> (ConEd/NYSEG maps) as a secondary signal. Pound Ridge is excluded (NYSEG edge — limited transmission value). ${DATA.hostingNote?'<br><span style="font-size:12px">'+DATA.hostingNote+'</span>':''}</p>`+
      DATA.priority.map((p,i)=>{const t=DATA.towns.find(x=>x.name===p.name)||{};const m=DATA.statusMeta[t.status]||{};
        return `<div style="border-left:4px solid ${m.color||'#1f3864'};padding:1px 0 4px 12px;margin:12px 0"><div style="font-weight:700">${i+1}. ${p.name} <span class="badge b-${t.status||'silent'}">${t.statusLabel||''}</span></div><div style="font-size:12.5px;color:var(--muted);margin:2px 0">${p.why}</div><div>${p.action}</div></div>`;}).join("");
  }
  const _dr=DATA.towns.filter(t=>t.dr);
  el("#doingright-body").innerHTML = `<p style="color:var(--muted);font-size:13.5px">Municipalities that adopted healthy, balanced BESS policy — clear tiered rules permitting storage with sensible limits. Use these as models when lobbying the target towns.</p>`+
    _dr.map(t=>`<div style="border-left:4px solid var(--green);padding:1px 0 4px 12px;margin:12px 0"><div style="font-weight:700">${t.name} <span class="dr-badge">MODEL</span></div><div style="font-size:12.5px;color:var(--muted);margin:2px 0">${t.scope||''}</div><div>${t.drReason||''}</div>${(t.links&&t.links.length)?linkList(t.links):''}</div>`).join("");
  el("#calsec-body").innerHTML = (DATA.hearingNote?`<p style="font-size:13px;color:#b9770e"><b>Public-hearing gap:</b> ${DATA.hearingNote}</p>`:"")+buildCalendar();
  const vf=DATA.towns.filter(t=>t.flags&&t.flags.length).map(t=>`<li><b>${t.name.replace(/^(Town \/ Village of |Village\/Town of |Town of |Village of |City of )/,"")}:</b> ${t.flags.join(" ")}</li>`).join("");
  el("#verify-body").innerHTML=`
    <p><b>Primary source for code status:</b> the BCW &amp; Earthkind workgroup's <b>ArcGIS BESS 2026</b> dataset (Google Drive), cross-checked against eCode360 and official town pages. Categories — <b>moratorium</b> (active pause), <b>ban</b> (prohibited), <b>allowed</b> (permitted under an adopted local law, often tiered by kWh), <b>no code</b> (code currently silent).</p>
    <p><b>Confirm before acting:</b></p><ul>${vf}</ul>
    <p style="font-size:13px;color:var(--muted)"><b>Note:</b> officials and meeting rosters for newly added villages are link-based pending deeper research; "no code" means the municipality's code is currently silent on BESS, not that storage is necessarily welcome.</p>`;
  if(DATA.changelog && DATA.changelog.length){
    el("#changelog").style.display="";
    el("#changelog-body").innerHTML = DATA.changelog.slice(0,8).map(c=>`<p><b>${c.date}:</b> ${c.items.join(" ")}</p>`).join("");
  }
  el("#sources").innerHTML=`<h2>Sources</h2>${linkList(DATA.sources)}`;
}

function fmtDate(d){const o={year:"numeric",month:"long",day:"numeric"};return new Date(d+"T12:00:00").toLocaleDateString("en-US",o);}

function buildCalendar(){
  const cal=DATA.calendar||{}; const today=new Date(); today.setHours(0,0,0,0);
  const H=70; const end=new Date(today); end.setDate(end.getDate()+H);
  const items=[];
  (cal.rules||[]).forEach(r=>{for(let i=0;i<=H;i++){const dd=new Date(today);dd.setDate(dd.getDate()+i);if(dd.getDay()===r.wd){const wk=Math.floor((dd.getDate()-1)/7)+1;if((r.weeks||[]).includes(wk))items.push({date:dd,label:r.town+(r.time?" · "+r.time:""),dl:false});}}});
  (cal.explicit||[]).forEach(e=>{const dd=new Date(e.date+"T12:00:00");if(dd>=today&&dd<=end)items.push({date:dd,label:e.town+(e.time?" · "+e.time:""),dl:false});});
  (cal.deadlines||[]).forEach(e=>{const dd=new Date(e.date+"T12:00:00");if(dd>=today&&dd<=end)items.push({date:dd,label:e.label,dl:true});});
  items.sort((a,b)=>a.date-b.date);
  const marks={};
  items.forEach(it=>{const k=it.date.getFullYear()+'-'+it.date.getMonth()+'-'+it.date.getDate();marks[k]=marks[k]||{dl:false,labels:[]};marks[k].labels.push(it.label);if(it.dl)marks[k].dl=true;});
  function grid(y,m){
    const first=new Date(y,m,1);const start=first.getDay();const days=new Date(y,m+1,0).getDate();
    let h=`<div class="cal-month"><div class="cal-mh">${first.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div><div class="cal-grid">`;
    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(x=>h+=`<div class="cal-dow">${x}</div>`);
    for(let i=0;i<start;i++)h+=`<div></div>`;
    for(let dn=1;dn<=days;dn++){const k=y+'-'+m+'-'+dn;const mk=marks[k];const cls=mk?(mk.dl?'cal-day on dl':'cal-day on'):'cal-day';const tip=mk?(' title="'+mk.labels.join(' | ').replace(/"/g,"")+'"'):'';h+=`<div class="${cls}"${tip}>${dn}</div>`;}
    h+=`</div></div>`;return h;
  }
  const y=today.getFullYear(),m=today.getMonth();
  const ny=(m===11?y+1:y),nm=(m===11?0:m+1);
  let html=`<div class="cal-wrap">${grid(y,m)}${grid(ny,nm)}</div>`;
  const fmt=d=>d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let last='';let list='<div class="cal-list">';
  items.forEach(it=>{const ds=fmt(it.date);if(ds!==last){list+=`<div class="d">${ds}</div>`;last=ds;}list+=`<div class="ev${it.dl?' dl':''}">${it.dl?'⚑ ':'• '}${it.label}</div>`;});
  list+='</div>';
  if(!items.length)list='<p style="color:var(--muted)">No items in the next ~10 weeks from the known schedules. Check town sites for agendas.</p>';
  return `<p style="color:var(--muted);font-size:13.5px">Recurring board meetings (computed from known schedules) and key BESS deadlines for the next ~10 weeks — show up to meet decision-makers and comment. Always confirm dates/agendas on the town site before attending.</p>`+html+list;
}

/* ---- Export: towns with action only (excludes status "none") ---- */
const _esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const _strip = s => String(s==null?"":s).replace(/<[^>]+>/g,"");
function _reportTowns(){ return DATA.towns.filter(t=>t.status!=="silent"); }
function _statusColor(s){return ({moratorium:"#c0392b",ban:"#7b1d12",healthy:"#2e7d32",overstrict:"#c2680a",silent:"#777",allowed:"#2e7d32"})[s]||"#1f3864";}
function buildReportHTML(){
  const d=fmtDate(DATA.lastUpdated); const pr=DATA.priority||[];
  let h=`<div style="font-family:Calibri,Arial,sans-serif;color:#111;font-size:11pt;line-height:1.45">`
    +`<div style="border-bottom:3px solid #1f3864;padding-bottom:8px;margin-bottom:14px">`
    +`<div style="color:#2e75b6;font-size:10pt;font-weight:bold;letter-spacing:.4px">BCW &amp; EARTHKIND &nbsp;·&nbsp; CLEAN ENERGY ACTION COALITION</div>`
    +`<div style="color:#1f3864;font-size:22pt;font-weight:bold;margin-top:3px">Priority Action Plan — Top 10 Municipalities</div>`
    +`<div style="color:#555;font-size:10pt;margin-top:4px">Battery energy storage policy &nbsp;·&nbsp; Data as of ${d} &nbsp;·&nbsp; ranked by code-change opportunity, town size, urgency &amp; grid hosting capacity</div></div>`;
  h+=`<div style="background:#f4f6fb;border-left:4px solid #2e75b6;padding:6px 12px;margin-bottom:14px;font-size:10.5pt"><b>Finding hearings:</b> hearings are not centrally listed — they are posted as one-off legal notices. Best places to look: the town/village Clerk's Legal Notices page, the town's eCode360 agendas/minutes portal, and the town website calendar. Emailing the Clerk to be added to BESS / hearing notifications is the most reliable method.</div>`;
  pr.forEach((p,i)=>{
    const t=DATA.towns.find(x=>x.name===p.name)||{};
    const col=_statusColor(t.status);
    const host=(t.hosting&&t.hosting.raw)?` &nbsp;·&nbsp; Grid capacity: ${_esc(t.hosting.tier)} (${_esc(t.hosting.raw)})`:"";
    const links=(t.links&&t.links.length)?`<p style="margin:5px 0"><b>Links:</b> `+t.links.map(l=>`<a href="${l[1]}" style="color:#2e75b6">${_esc(l[0])}</a>`).join(" &nbsp;·&nbsp; ")+`</p>`:"";
    const offs=(t.officials&&t.officials.length)?`<p style="margin:6px 0 1px"><b>Officials &amp; contacts:</b></p>`+t.officials.map(o=>`<p style="margin:1px 0">${_esc(o.role)}: ${_esc(o.name)}${o.email?` &nbsp;·&nbsp; <a href="mailto:${o.email}" style="color:#2e75b6">${_esc(o.email)}</a>`:""}${o.phone?" &nbsp;·&nbsp; "+_esc(o.phone):""}</p>`).join(""):`<p style="margin:6px 0 1px;color:#8a6d00"><i>Officials/contacts not yet compiled for this municipality — use the links below or the town/village site.</i></p>`;
    h+=`<div style="page-break-inside:avoid;break-inside:avoid;border-left:4px solid ${col};padding:1px 0 8px 12px;margin:0 0 16px 0">`
      +`<div style="font-size:14.5pt;font-weight:bold;color:#1f3864">${i+1}. ${_esc(p.name)} <span style="font-size:9pt;color:#fff;background:${col};padding:1px 7px">${_esc(t.statusLabel||'')}</span></div>`
      +`<div style="color:#555;font-size:9.5pt;margin:2px 0 4px">${_esc(t.scope||'')}${host}</div>`
      +`<p style="margin:5px 0"><b>Why it ranks here:</b> ${_esc(p.why)}</p>`
      +`<p style="margin:5px 0"><b>Recommended action:</b> ${_esc(p.action)}</p>`
      +`<p style="margin:5px 0"><b>How to engage:</b> ${_esc(p.engage||"Attend the board's regular meetings and use the public-comment period; check the Clerk / eCode360 for the hearing notice.")}</p>`
      +offs+links+`</div>`;
  });
  h+=`</div>`;
  return h;
}
function exportPDF(){
  document.getElementById("printroot").innerHTML=buildReportHTML();
  const prev=document.title;
  document.title="Westchester_BESS_Report";
  window.print();
  setTimeout(()=>{document.title=prev;},1000);
}
function exportDOCX(){
  if(!window.htmlDocx){alert("Word library is still loading — please try again in a moment.");return;}
  const full="<!DOCTYPE html><html><head><meta charset='utf-8'></head><body>"+buildReportHTML()+"</body></html>";
  const blob=window.htmlDocx.asBlob(full,{orientation:"portrait",margins:{top:720,right:720,bottom:720,left:720}});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="Westchester_BESS_Report.docx";
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);
}

function applyFilter(){
  const q=el("#search").value.trim().toLowerCase();
  const f=currentFilter;
  document.querySelectorAll(".card").forEach((c,i)=>{
    const t=DATA.towns[i];
    const hay=JSON.stringify(t).toLowerCase();
    const okStatus = f==="all"||t.status===f;
    const okSearch = !q||hay.includes(q);
    c.classList.toggle("hide", !(okStatus&&okSearch));
  });
}

document.addEventListener("DOMContentLoaded",()=>{
  el("#updated").textContent="Data verified: "+fmtDate(DATA.lastUpdated)+" · "+DATA.towns.length+" towns · refreshed every weekday";
  el("#footer").innerHTML=`Prepared for the BCW / EarthKind BESS Workgroup · Data as of ${fmtDate(DATA.lastUpdated)}.<br>BESS status reflects the May 2026 statewide tracker and town records; confirm the latest votes at each town's next meeting.`;
  renderStats();renderCards();renderBlocks();
  el("#search").addEventListener("input",applyFilter);
});
</script>
